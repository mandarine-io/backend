name: Development service workflow
on:
  push:
    branches:
      - '!develop'
      - '!master'
      - '!main'
    paths:
      - 'service/**'
  pull_request:
  workflow_dispatch:
jobs:
  check-changes:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - service
    outputs:
      changes: ${{ steps.check-changes.outputs.changes }}
    steps:
      - name: Check out repository
        id: checkout
        uses: actions/checkout@v4
      - name: Check for changes in ${{ matrix.directory }}
        id: check-changes
        uses: ./.github/actions/check-changes
        with:
          directory: ${{ matrix.directory }}
  format:
    needs:
      - check-changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - service
    steps:
      - name: Check out repository
        id: checkout
        uses: actions/checkout@v4
      - name: Format service
        id: format
        if: needs.check-changes.outputs.changes == 'true'
        uses: ./.github/actions/format-go
        with:
          working-directory: ${{ matrix.directory }}
  lint:
    needs:
      - format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - service
    steps:
      - name: Check out repository
        id: checkout
        uses: actions/checkout@v4
      - name: Lint service
        id: lint
        if: needs.check-changes.outputs.changes == 'true'
        uses: ./.github/actions/lint-go
        with:
          working-directory: ${{ matrix.directory }}
  build:
    needs:
      - lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - service
    steps:
      - name: Check out repository
        id: checkout
        uses: actions/checkout@v4
      - name: Build service
        id: build
        if: needs.check-changes.outputs.changes == 'true'
        uses: ./.github/actions/build-go
        with:
          main-path: ${{ matrix.directory }}/cmd/api/main.go
  unit-tests:
    needs:
      - build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - service
    steps:
      - name: Check out repository
        id: checkout
        uses: actions/checkout@v4
      - name: Unit tests
        id: unit-tests
        if: needs.check-changes.outputs.changes == 'true'
        uses: ./.github/actions/test-with-allure-go
        with:
          test_dir: ${{ matrix.directory }}/tests/unit/...
          publish_branch: gh-unit-tests-${{ matrix.directory }}-pages-dev
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}