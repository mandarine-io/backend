name: Release candidate workflow
on:
  push:
    tags:
        - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
jobs:
  format:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - baselib
          - iam-service
    steps:
      - name: Check out repository
        id: checkout
        uses: actions/checkout@v4
      - name: Format
        id: format
        uses: ./.github/actions/format-go
        with:
          working-directory: ${{ matrix.directory }}
  lint:
    needs:
      - format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - baselib
          - iam-service
    steps:
      - name: Check out repository
        id: checkout
        uses: actions/checkout@v4
      - name: Lint
        id: lint
        uses: ./.github/actions/lint-go
        with:
          working-directory: ${{ matrix.directory }}
  build:
    needs:
      - lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - iam-service
    steps:
      - name: Check out repository
        id: checkout
        uses: actions/checkout@v4
      - name: Build
        id: build
        uses: ./.github/actions/build-go
        with:
          working-directory: ${{ matrix.directory }}
          main-path: cmd/api/main.go
  unit-tests:
    needs:
      - build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - baselib
          - iam-service
    steps:
      - name: Check out repository
        id: checkout
        uses: actions/checkout@v4
      - name: Unit tests
        id: unit-tests
        uses: ./.github/actions/test-with-allure-go
        with:
          working-directory: ${{ matrix.directory }}
          test_dir: tests/unit/...
          publish_branch: gh-unit-tests-${{ matrix.directory }}-pages-rc
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
  e2e-tests:
    needs:
      - build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - iam-service
    steps:
      - name: Check out repository
        id: checkout
        uses: actions/checkout@v4
      - name: E2E tests
        id: e2e-tests
        uses: ./.github/actions/test-with-allure-go
        with:
          working-directory: ${{ matrix.directory }}
          test_dir: tests/e2e/...
          publish_branch: gh-e2e-tests-${{ matrix.directory }}-pages-rc
        env:
          APP_TEST_DOCKER_COMPOSE_PATH: ${{ matrix.directory }}/docker-compose.test.yml
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
  publish-docker:
    needs:
      - unit-tests
      - e2e-tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - baselib
          - iam-service
    steps:
      - name: Check out repository
        id: checkout
        uses: actions/checkout@v4
      - name: Publish Docker image
        id: publish-docker
        uses: ./.github/actions/publish-docker
        with:
          tag: ${{ github.ref_name }}
          context: ${{ matrix.directory }}
          image_name: ${{ matrix.directory }}
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
  release:
    needs:
      - publish-docker
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        id: checkout
        uses: actions/checkout@v4
      - name: Release
        id: release
        uses: ./.github/actions/release
        with:
          tag: ${{ github.ref_name }}
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
  deploy-rc:
    needs:
      - release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        id: checkout
        uses: actions/checkout@v4
      - name: Deploy
        id: deploy
        uses: ./.github/actions/deploy
        with:
          docker_compose_file: deploy/docker/docker-compose.rc.yml
          additional_deploy_files: deploy/config/nginx/nginx.conf
          target_path: deploy-rc
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ENV_FILE_CONTENT: ${{ secrets.RC_ENV_FILE_CONTENT }}
          SSH_PRIVATE_KEY: ${{ secrets.RC_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.RC_SSH_HOST }}
          SSH_USER: ${{ secrets.RC_SSH_USER }}